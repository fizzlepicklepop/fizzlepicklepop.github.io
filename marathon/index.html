<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MARATHON // POPULATION</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #050505; color: #00ffcc; font-family: monospace; text-align: center; margin: 0; }
        .chart-box { width: 95vw; height: 85vh; margin: 20px auto; }
        h1 { letter-spacing: 10px; border-bottom: 1px solid #00ffcc; display: inline-block; padding: 10px 50px; }
    </style>
</head>
<body>
    <h1>RUNNER POPULATION // TAU CETI IV</h1>
    <div class="chart-box"><canvas id="marathonChart"></canvas></div>
    <script>
        async function buildChart() {
            const res = await fetch('data.json');
            const history = await res.json();
            new Chart(document.getElementById('marathonChart'), {
                type: 'line',
                data: {
                    datasets: [{
                        label: 'Active Runners',
                        data: history,
                        borderColor: '#00ffcc',
                        backgroundColor: 'rgba(0, 255, 204, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { grid: { color: '#222' }, ticks: { color: '#00ffcc' } },
                        x: { type: 'category', grid: { display: false }, ticks: { display: false } }
                    }
                }
            });
        }
        buildChart();
    </script>
</body>
</html>
